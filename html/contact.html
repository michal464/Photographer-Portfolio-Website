<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Yaron Barkai</title>
    <link rel="stylesheet" href="../css/contact.css">
</head>
<body>
    <header>
        <iframe src="../html/nav.html" title="nav" frameborder="0" dir="ltr"></iframe>
    </header>
    <main>
        <h1>Contact Yaron Barkai</h1>
        <div class="contact-options">
            <div class="contact-option">
                <h2><img src="../images/contact/icon-email.png" alt="Email Icon" class="contact-icon"> Email</h2>
                <p>You can reach me via email at: <a href="mailto:yaron.barkai@example.com">yaron.barkai@example.com</a></p>
            </div>
            <div class="contact-option">
                <h2><img src="../images/contact/icon-watsup.png" alt="WhatsApp Icon" class="contact-icon"> WhatsApp</h2>
                <p>Send me a message on WhatsApp: <a href="https://wa.me/1234567890" target="_blank">Chat on WhatsApp</a></p>
            </div>
            <div class="contact-option">
                <h2><img src="../images/contact/icon-chat.png" alt="Chat Icon" class="contact-icon"> Chat</h2>
                <p>Start a chat with me: <a href="https://example.com/chat" target="_blank">Chat Now</a></p>
            </div>
            <div class="contact-option">
                <h2><img src="../images/contact/icon-phone.png" alt="Phone Icon" class="contact-icon"> Phone</h2>
                <p>Feel free to call me at: <a href="tel:+1234567890">+1 (234) 567-890</a></p>
            </div>
        </div>
    </main>
</body>
</html>
